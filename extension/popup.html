<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="hdr">
    <div class="brand">
      <span class="logo">✈</span>
      <span class="brand-name">ApplyPilot</span>
    </div>
    <span id="conn" class="conn conn--off">Not connected</span>
  </header>

  <!-- Token setup (shown until a working token is saved) -->
  <section id="setup" class="setup" hidden>
    <p class="setup-hint">Paste the token printed by the dashboard on startup
      (found in <code>~/.applypilot/ext_token</code>).</p>
    <div class="row">
      <input id="token" type="password" class="input" placeholder="ApplyPilot token" spellcheck="false" autocomplete="off" />
      <button id="token-save" class="btn btn--primary">Save</button>
    </div>
    <p id="setup-err" class="err" hidden></p>
  </section>

  <!-- Main -->
  <section id="main" hidden>
    <div class="toolbar">
      <button id="refresh" class="btn btn--primary">↻ Refresh contacts</button>
      <button id="settings-toggle" class="btn btn--ghost" title="Change token">⚙</button>
    </div>
    <div id="count" class="count"></div>
    <div id="list" class="list"></div>
    <div id="empty" class="empty" hidden>
      No contacts yet. Run <strong>Find contacts</strong> in the dashboard, then Refresh.
    </div>
  </section>

  <footer class="foot">Copy the note, open their LinkedIn, paste &amp; send. You stay in control.</footer>

  <script src="popup.js"></script>
</body>
</html>
